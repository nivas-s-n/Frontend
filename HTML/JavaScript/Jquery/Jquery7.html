<script>
    $(document).ready(function () {
        $("#fi").click(function () {
            $("div").fadeIn(5000);
        })
        $("#fo").click(function () {
            $("div").fadeOut(5000);
        })
    })
</script>
<button type="button" id="fi">Fade In</button>
<button type="button" id="fo">Fade Out</button>
<div style="width: 80px; height: 80px; background-color: blueviolet;"></div>
